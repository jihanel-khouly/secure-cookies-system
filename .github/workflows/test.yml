name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show full structure
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Find package.json and install
        run: |
          echo "Searching for package.json..."
          find . -name package.json
          cd $(dirname $(find . -name package.json | head -n 1))
          echo "Entering project directory..."
          pwd
          ls
          pnpm install

      - name: Build (if exists)
        run: |
          cd $(dirname $(find . -name package.json | head -n 1))
          pnpm run build || echo "No build script"

      - name: Test (if exists)
        run: |
          cd $(dirname $(find . -name package.json | head -n 1))
          pnpm test || echo "No test script"